<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esercizio 7 - Async Fetch</title>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>Esercizio 7: Fetch API</h1>
    <p>Interazione asincrona con un'API esterna.</p>

    <div id="user-card" style="border: 1px solid #ccc; padding: 20px; max-width: 400px; border-radius: 8px; background-color: #f9f9f9;">
        <h3 id="user-name">Caricamento in corso...</h3>
        <div id="user-details"></div>
        <hr>
        <button id="loadUser" style="padding: 10px 20px; cursor: pointer;">Carica Nuovo Utente</button>
    </div>

    <script>
        const loadBtn = document.getElementById('loadUser');
        const nameHeading = document.getElementById('user-name');
        const detailsDiv = document.getElementById('user-details');

        // Funzione per caricare i dati
        const fetchUserData = (id) => {
            nameHeading.innerText = "Caricamento...";
            detailsDiv.innerHTML = "";

            // La funzione fetch() avvia una richiesta HTTP asincrona
            // Restituisce una 'Promise'
            fetch(`https://jsonplaceholder.typicode.com/users/${id}`)
                .then(response => {
                    // Verifichiamo se la risposta è andata a buon fine (status 200)
                    if (!response.ok) throw new Error("Utente non trovato");
                    return response.json(); // Trasformiamo il body della risposta in JSON (oggetto JS)
                })
                .then(user => {
                    // Qui abbiamo finalmente i dati dell'utente
                    nameHeading.innerText = user.name;
                    detailsDiv.innerHTML = `
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Città:</strong> ${user.address.city}</p>
                        <p><strong>Azienda:</strong> ${user.company.name}</p>
                    `;
                    console.log("Dati ricevuti:", user);
                })
                .catch(error => {
                    // Gestione degli errori (es. rete assente o 404)
                    nameHeading.innerText = "Errore!";
                    detailsDiv.innerHTML = `<p style="color: red;">${error.message}</p>`;
                });
        };

        // Carichiamo un utente iniziale
        fetchUserData(1);

        // Evento al click: carica un utente casuale tra 1 e 10
        loadBtn.addEventListener('click', () => {
            const randomId = Math.floor(Math.random() * 10) + 1;
            fetchUserData(randomId);
        });
    </script>
</body>
</html>
