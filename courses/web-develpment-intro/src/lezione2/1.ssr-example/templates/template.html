<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - SSR con Flask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#26428b',
                        'primary-dark': '#1a2e61',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-start justify-center pt-12 px-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h1 class="text-3xl font-bold text-center text-primary mb-8 tracking-tight">Todo App (SSR)</h1>

        <form action="{{ url_for('add_task') }}" method="POST" class="flex gap-3 mb-8">
            <input type="text" name="task_text" placeholder="Cosa devi fare?" required
                class="flex-grow px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all">
            <button type="submit"
                class="px-6 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-primary-dark transition-colors shadow-md">
                Aggiungi
            </button>
        </form>

        <ul class="space-y-3">
            {% for (id, task) in tasks.items() %}
            <li class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100 group hover:border-primary/20 transition-all {% if task.completed %}opacity-60{% endif %}">
                <span class="text-slate-700 font-medium {% if task.completed %}line-through text-slate-400{% endif %}">
                    {{ task.text }}
                </span>
                <div class="flex items-center">
                    <a href="{{ url_for('toggle_task', task_id=id) }}"
                        class="text-xs font-bold uppercase tracking-wider text-primary hover:text-primary-dark mr-4 transition-colors">
                        {% if task.completed %}Riapri{% else %}Fatto{% endif %}
                    </a>
                    <!-- ESERCIZIO: Far funzionare questo link -->
                    <a href="#" class="text-red-500 hover:text-red-700 font-bold transition-colors px-2">
                        &times;
                    </a>
                </div>
            </li>
            {% endfor %}
        </ul>

        {% if not tasks %}
        <p class="text-center text-slate-400 mt-8 italic text-sm">Nessuna task presente. Inizia aggiungendone una!</p>
        {% endif %}
    </div>
</body>
</html>
