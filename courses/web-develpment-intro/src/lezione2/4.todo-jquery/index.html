<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Todo App - jQuery Version</title>
    <!-- Riusiamo lo stile della versione vanilla per coerenza -->
    <link rel="stylesheet" href="../3.todo-vanilla/style.css">
</head>
<body>
    <div class="container">
        <h1>Todo App (jQuery)</h1>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Nuovo task...">
            <button id="addBtn">Aggiungi</button>
        </div>
        <ul id="todoList"></ul>
    </div>

    <!-- Includiamo jQuery via CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
