<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Video Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .primary-color { color: rgb(38, 66, 139); }
        .bg-primary { background-color: rgb(38, 66, 139); }
        video { transform: scaleX(-1); } /* Mirror effect per il video locale */
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
        <header class="bg-primary p-6 text-white text-center">
            <h1 class="text-2xl font-bold">WebRTC Video Loopback</h1>
            <p class="text-sm opacity-80 mt-1">Acquisizione multimediale e trasmissione P2P locale</p>
        </header>

        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Video Locale (Peer A) -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b pb-2">
                    <h2 class="text-xl font-semibold primary-color">Video Locale</h2>
                    <span id="statusLocal" class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600">Camera Off</span>
                </div>
                <div class="aspect-video bg-black rounded-lg overflow-hidden shadow-inner flex items-center justify-center relative">
                    <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover bg-black"></video>
                    <div id="localPlaceholder" class="absolute inset-0 flex items-center justify-center text-gray-500">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </div>
                </div>
                <p class="text-xs text-gray-500 italic">Sorgente: navigator.mediaDevices.getUserMedia()</p>
            </div>

            <!-- Video Remoto (Peer B) -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b pb-2">
                    <h2 class="text-xl font-semibold primary-color">Video Remoto</h2>
                    <span id="statusRemote" class="text-xs bg-gray-200 px-2 py-1 rounded text-gray-600">No Stream</span>
                </div>
                <div class="aspect-video bg-black rounded-lg overflow-hidden shadow-inner flex items-center justify-center relative">
                    <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover bg-black"></video>
                    <div id="remotePlaceholder" class="absolute inset-0 flex items-center justify-center text-gray-500">
                        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </div>
                </div>
                <p class="text-xs text-gray-500 italic">Ricevuto tramite: RTCPeerConnection (P2P)</p>
            </div>
        </div>

        <div class="bg-gray-50 p-8 border-t flex flex-col items-center gap-6">
            <div class="flex gap-4">
                <button id="cameraBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    Attiva Camera
                </button>
                <button id="callBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-700 transition flex items-center gap-2 disabled:opacity-50" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.204.434l-2.24 3.58a12.042 12.042 0 01-5.546-5.546l3.58-2.24a1 1 0 00.434-1.204L10.528 3.684A1 1 0 009.58 3H5z"></path></svg>
                    Avvia Video Chiamata
                </button>
                <button id="hangupBtn" class="bg-red-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-700 transition disabled:opacity-50" disabled>
                    Termina
                </button>
            </div>
            
            <div id="logArea" class="w-full max-w-2xl bg-black rounded p-3 font-mono text-[10px] text-green-400 h-24 overflow-y-auto">
                > Sistema pronto. Inizializzare la camera per procedere.
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
